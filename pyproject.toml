[project]
name = "chromaticity"
version = "0.2.0"
description = "Perceptually-principled audio-reactive visualiser for live music performance"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "moderngl>=5.12",     # BSD-2-Clause
    "numpy>=2.4",         # BSD-3-Clause
    "pyglet>=2.1",        # BSD-3-Clause
    "scikit-image>=0.26", # BSD-3-Clause
    "sounddevice>=0.5",   # MIT
    "librosa>=0.11",      # ISC (offline analysis only; real-time path uses custom implementation)
]
# Reproducible installs: use `uv pip install --require-hashes -r requirements.lock`
# Lockfile generated by: uv pip compile pyproject.toml --generate-hashes --output-file requirements.lock

[project.optional-dependencies]
dev = [
    "black",
    "ruff",
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
